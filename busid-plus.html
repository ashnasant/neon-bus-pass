<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BusID+ | Smart Digital College Bus Pass System</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
:root {
  --bg: #0a0e1a;
  --bg2: #0f1525;
  --bg3: #141929;
  --surface: #1a2035;
  --surface2: #1f2840;
  --border: #2a3550;
  --border2: #344060;
  --accent: #00d4ff;
  --accent2: #0095cc;
  --accent3: #00ffb3;
  --warn: #ff6b35;
  --danger: #ff3b5c;
  --success: #00c87a;
  --text: #e8edf8;
  --text2: #8a9bb8;
  --text3: #4a5870;
  --gold: #ffd700;
  --purple: #a855f7;
  --radius: 14px;
  --radius2: 8px;
  --shadow: 0 8px 32px rgba(0,0,0,0.4);
  --glow: 0 0 20px rgba(0,212,255,0.15);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

h1,h2,h3,h4,h5 { font-family: 'Syne', sans-serif; }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg2); }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

/* ─── LAYOUT ─── */
.app { display: flex; min-height: 100vh; }
.sidebar {
  width: 260px; min-height: 100vh; background: var(--bg2);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  position: fixed; top: 0; left: 0; z-index: 100;
  transition: transform .3s ease;
}
.sidebar.hidden { transform: translateX(-260px); }
.main-content {
  flex: 1; margin-left: 260px;
  transition: margin-left .3s ease;
  min-height: 100vh;
}
.main-content.full { margin-left: 0; }

/* ─── SIDEBAR ─── */
.sidebar-logo {
  padding: 24px 20px;
  border-bottom: 1px solid var(--border);
}
.logo-mark {
  display: flex; align-items: center; gap: 10px;
}
.logo-icon {
  width: 38px; height: 38px; background: var(--accent);
  border-radius: 10px; display: flex; align-items: center; justify-content: center;
  font-family: 'Syne',sans-serif; font-weight: 800; color: var(--bg); font-size: 16px;
  box-shadow: 0 0 16px rgba(0,212,255,0.4);
}
.logo-text { font-family: 'Syne',sans-serif; font-weight: 700; font-size: 18px; }
.logo-text span { color: var(--accent); }
.logo-sub { font-size: 10px; color: var(--text3); margin-top: 2px; letter-spacing: 1px; text-transform: uppercase; }

.nav-section { padding: 16px 12px 8px; }
.nav-label { font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text3); padding: 0 8px; margin-bottom: 8px; }
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px; border-radius: var(--radius2);
  cursor: pointer; transition: all .2s; color: var(--text2);
  font-size: 14px; font-weight: 500; margin-bottom: 2px;
  position: relative;
}
.nav-item:hover { background: var(--surface); color: var(--text); }
.nav-item.active { background: rgba(0,212,255,0.1); color: var(--accent); }
.nav-item.active::before {
  content: ''; position: absolute; left: 0; top: 50%; transform: translateY(-50%);
  width: 3px; height: 60%; background: var(--accent); border-radius: 0 3px 3px 0;
}
.nav-icon { width: 18px; text-align: center; flex-shrink: 0; }
.nav-badge {
  margin-left: auto; background: var(--danger); color: white;
  font-size: 10px; padding: 2px 6px; border-radius: 10px; font-weight: 600;
}

.sidebar-footer {
  margin-top: auto; padding: 16px; border-top: 1px solid var(--border);
}
.user-card {
  display: flex; align-items: center; gap: 10px;
  padding: 10px; background: var(--surface); border-radius: var(--radius2); cursor: pointer;
}
.user-avatar {
  width: 34px; height: 34px; border-radius: 50%; background: var(--accent);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Syne',sans-serif; font-weight: 700; font-size: 13px; color: var(--bg);
  flex-shrink: 0; overflow: hidden;
}
.user-avatar img { width: 100%; height: 100%; object-fit: cover; }
.user-info { flex: 1; min-width: 0; }
.user-name { font-size: 13px; font-weight: 600; truncate: true; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.user-role { font-size: 11px; color: var(--text3); text-transform: capitalize; }
.logout-btn {
  background: none; border: none; color: var(--text3); cursor: pointer;
  padding: 4px; border-radius: 6px; transition: all .2s;
}
.logout-btn:hover { color: var(--danger); background: rgba(255,59,92,0.1); }

/* ─── TOP BAR ─── */
.topbar {
  height: 60px; background: var(--bg2); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 24px; gap: 16px;
  position: sticky; top: 0; z-index: 50;
}
.topbar-title { font-family: 'Syne',sans-serif; font-size: 18px; font-weight: 700; flex: 1; }
.topbar-actions { display: flex; gap: 10px; }
.icon-btn {
  width: 36px; height: 36px; border-radius: var(--radius2);
  background: var(--surface); border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all .2s; color: var(--text2);
  font-size: 16px;
}
.icon-btn:hover { border-color: var(--accent); color: var(--accent); }

/* ─── CONTENT AREA ─── */
.page { padding: 28px; animation: fadeIn .3s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

/* ─── CARDS ─── */
.card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 20px;
}
.card-title { font-family: 'Syne',sans-serif; font-weight: 700; font-size: 16px; margin-bottom: 4px; }
.card-sub { font-size: 13px; color: var(--text2); }

/* ─── STAT CARDS ─── */
.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 24px; }
.stat-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 20px; position: relative; overflow: hidden;
  transition: transform .2s, border-color .2s;
}
.stat-card:hover { transform: translateY(-2px); border-color: var(--border2); }
.stat-card .glow {
  position: absolute; top: -30px; right: -30px;
  width: 80px; height: 80px; border-radius: 50%; opacity: .15;
}
.stat-value { font-family: 'Syne',sans-serif; font-size: 32px; font-weight: 800; line-height: 1; }
.stat-label { font-size: 12px; color: var(--text2); margin-top: 6px; }
.stat-change { font-size: 12px; margin-top: 8px; display: flex; align-items: center; gap: 4px; }
.stat-change.up { color: var(--success); }
.stat-change.down { color: var(--danger); }
.stat-icon { position: absolute; right: 16px; bottom: 16px; font-size: 28px; opacity: .3; }

/* ─── BUTTONS ─── */
.btn {
  padding: 10px 18px; border-radius: var(--radius2); font-size: 14px; font-weight: 600;
  cursor: pointer; border: none; transition: all .2s; display: inline-flex; align-items: center; gap: 7px;
  font-family: 'DM Sans', sans-serif;
}
.btn-primary { background: var(--accent); color: var(--bg); }
.btn-primary:hover { background: #00b8e6; box-shadow: 0 4px 20px rgba(0,212,255,0.3); }
.btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border2); }
.btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
.btn-success { background: var(--success); color: var(--bg); }
.btn-success:hover { background: #00b06c; }
.btn-danger { background: var(--danger); color: white; }
.btn-danger:hover { background: #e0324e; }
.btn-warn { background: var(--warn); color: white; }
.btn-sm { padding: 6px 12px; font-size: 12px; }
.btn-lg { padding: 13px 24px; font-size: 16px; }
.btn:disabled { opacity: .5; cursor: not-allowed; }

/* ─── FORMS ─── */
.form-group { margin-bottom: 18px; }
.form-label { display: block; font-size: 13px; font-weight: 600; color: var(--text2); margin-bottom: 7px; }
.form-input, .form-select, .form-textarea {
  width: 100%; padding: 10px 14px; background: var(--bg3);
  border: 1px solid var(--border); border-radius: var(--radius2);
  color: var(--text); font-size: 14px; font-family: 'DM Sans', sans-serif;
  transition: border-color .2s, box-shadow .2s; outline: none;
}
.form-input:focus, .form-select:focus, .form-textarea:focus {
  border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,212,255,0.1);
}
.form-select option { background: var(--bg3); }
.form-textarea { resize: vertical; min-height: 80px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.form-error { font-size: 12px; color: var(--danger); margin-top: 5px; }

/* ─── BADGE ─── */
.badge {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 600;
  text-transform: uppercase; letter-spacing: .5px;
}
.badge-active { background: rgba(0,200,122,0.15); color: var(--success); border: 1px solid rgba(0,200,122,0.3); }
.badge-expired { background: rgba(255,59,92,0.12); color: var(--danger); border: 1px solid rgba(255,59,92,0.25); }
.badge-pending { background: rgba(255,107,53,0.12); color: var(--warn); border: 1px solid rgba(255,107,53,0.25); }
.badge-approved { background: rgba(0,200,122,0.12); color: var(--success); border: 1px solid rgba(0,200,122,0.25); }
.badge-rejected { background: rgba(255,59,92,0.12); color: var(--danger); border: 1px solid rgba(255,59,92,0.25); }
.badge-verified { background: rgba(0,212,255,0.12); color: var(--accent); border: 1px solid rgba(0,212,255,0.25); }

/* ─── TABLE ─── */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
thead th {
  padding: 10px 14px; text-align: left; color: var(--text3);
  font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .8px;
  border-bottom: 1px solid var(--border); background: var(--bg2);
}
tbody td { padding: 12px 14px; border-bottom: 1px solid var(--border); vertical-align: middle; }
tbody tr:hover { background: rgba(255,255,255,0.02); }
tbody tr:last-child td { border-bottom: none; }

/* ─── MODAL ─── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(6px);
  display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 20px;
  animation: fadeOverlay .2s ease;
}
@keyframes fadeOverlay { from { opacity: 0; } to { opacity: 1; } }
.modal {
  background: var(--surface); border: 1px solid var(--border2);
  border-radius: 18px; width: 100%; max-width: 520px; max-height: 90vh;
  overflow-y: auto; box-shadow: 0 24px 80px rgba(0,0,0,0.6);
  animation: slideModal .25s ease;
}
@keyframes slideModal { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.modal-header {
  padding: 22px 24px 16px; display: flex; align-items: flex-start; gap: 12px;
  border-bottom: 1px solid var(--border);
}
.modal-icon { font-size: 28px; }
.modal-title { font-family: 'Syne',sans-serif; font-weight: 700; font-size: 18px; }
.modal-sub { font-size: 13px; color: var(--text2); margin-top: 3px; }
.modal-close { margin-left: auto; background: none; border: none; color: var(--text3); cursor: pointer; font-size: 20px; padding: 2px; }
.modal-close:hover { color: var(--danger); }
.modal-body { padding: 22px 24px; }
.modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; gap: 10px; justify-content: flex-end; }

/* ─── AUTH PAGES ─── */
.auth-page {
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  background: var(--bg); position: relative; overflow: hidden; padding: 20px;
}
.auth-bg {
  position: absolute; inset: 0; pointer-events: none;
  background: radial-gradient(ellipse 60% 50% at 20% 40%, rgba(0,212,255,0.06) 0%, transparent 60%),
              radial-gradient(ellipse 40% 40% at 80% 70%, rgba(168,85,247,0.05) 0%, transparent 60%);
}
.auth-grid {
  position: absolute; inset: 0; pointer-events: none;
  background-image: linear-gradient(rgba(255,255,255,.02) 1px, transparent 1px),
                    linear-gradient(90deg, rgba(255,255,255,.02) 1px, transparent 1px);
  background-size: 40px 40px;
}
.auth-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 22px; padding: 40px; width: 100%; max-width: 440px;
  box-shadow: 0 32px 80px rgba(0,0,0,0.5); position: relative; z-index: 1;
}
.auth-logo { text-align: center; margin-bottom: 28px; }
.auth-logo .icon { width: 56px; height: 56px; background: var(--accent); border-radius: 16px;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Syne',sans-serif; font-weight: 800; font-size: 22px; color: var(--bg);
  margin: 0 auto 12px; box-shadow: 0 0 30px rgba(0,212,255,0.4); }
.auth-title { font-family: 'Syne',sans-serif; font-size: 24px; font-weight: 800; }
.auth-subtitle { font-size: 14px; color: var(--text2); margin-top: 4px; }
.auth-divider { display: flex; align-items: center; gap: 12px; margin: 20px 0; }
.auth-divider span { color: var(--text3); font-size: 12px; }
.auth-divider::before,.auth-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

/* ─── DIGITAL PASS ─── */
.bus-pass {
  max-width: 380px; border-radius: 20px; overflow: hidden;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5); position: relative;
  font-family: 'DM Sans', sans-serif;
}
.bus-pass.active-pass {
  background: linear-gradient(135deg, #0a1628 0%, #0d2140 50%, #051a35 100%);
  border: 1px solid rgba(0,212,255,0.3);
}
.bus-pass.expired-pass {
  background: linear-gradient(135deg, #1a0a0a 0%, #2a0f0f 50%, #150808 100%);
  border: 1px solid rgba(255,59,92,0.3);
  filter: grayscale(30%);
}
.pass-header {
  padding: 16px 20px; display: flex; justify-content: space-between; align-items: center;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}
.pass-college { font-family: 'Syne',sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }
.pass-type { font-size: 10px; color: var(--text2); margin-top: 2px; }
.pass-validity-badge {
  padding: 5px 12px; border-radius: 20px; font-size: 11px; font-weight: 700; letter-spacing: 1px;
}
.pass-validity-badge.active { background: rgba(0,200,122,0.2); color: var(--success); border: 1px solid var(--success); }
.pass-validity-badge.expired { background: rgba(255,59,92,0.2); color: var(--danger); border: 1px solid var(--danger); }
.pass-body { padding: 20px; display: flex; gap: 16px; }
.pass-photo {
  width: 80px; height: 90px; border-radius: 10px; object-fit: cover; flex-shrink: 0;
  border: 2px solid rgba(0,212,255,0.3);
  background: var(--surface); display: flex; align-items: center; justify-content: center;
  color: var(--text3); font-size: 24px;
}
.pass-photo img { width: 100%; height: 100%; object-fit: cover; border-radius: 8px; }
.pass-details { flex: 1; min-width: 0; }
.pass-name { font-family: 'Syne',sans-serif; font-size: 16px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.pass-id { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--accent); margin-top: 3px; }
.pass-info-grid { margin-top: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.pass-info-item .label { font-size: 9px; color: var(--text3); text-transform: uppercase; letter-spacing: .8px; }
.pass-info-item .value { font-size: 12px; font-weight: 600; color: var(--text); margin-top: 1px; }
.pass-footer {
  padding: 14px 20px; border-top: 1px solid rgba(255,255,255,0.08);
  display: flex; align-items: center; justify-content: space-between;
}
.pass-qr { width: 60px; height: 60px; background: white; border-radius: 8px; padding: 4px; display: flex; align-items: center; justify-content: center; }
.pass-validity-info { font-size: 11px; color: var(--text2); }
.pass-validity-info strong { display: block; color: var(--text); font-size: 12px; }
.pass-strip {
  height: 4px;
}
.pass-strip.active { background: linear-gradient(90deg, var(--accent), var(--accent3)); }
.pass-strip.expired { background: linear-gradient(90deg, var(--danger), #ff8c69); }
.pass-watermark {
  position: absolute; right: -15px; top: 50%; transform: translateY(-50%) rotate(90deg);
  font-family: 'Syne',sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 3px;
  color: rgba(255,255,255,0.04); text-transform: uppercase; pointer-events: none;
}

/* ─── VERIFICATION ─── */
.verify-box {
  max-width: 480px; margin: 0 auto;
}
.verify-input-big {
  width: 100%; padding: 16px 20px; font-size: 18px; font-family: 'DM Mono', monospace;
  letter-spacing: 3px; text-transform: uppercase; text-align: center;
  background: var(--bg3); border: 2px solid var(--border);
  border-radius: var(--radius); color: var(--text); outline: none;
  transition: border-color .2s;
}
.verify-input-big:focus { border-color: var(--accent); }
.verify-result {
  margin-top: 20px; padding: 20px; border-radius: var(--radius);
  border: 1px solid; animation: fadeIn .3s ease;
}
.verify-result.valid { border-color: var(--success); background: rgba(0,200,122,0.05); }
.verify-result.invalid { border-color: var(--danger); background: rgba(255,59,92,0.05); }
.verify-tick { font-size: 40px; margin-bottom: 10px; display: block; }

/* ─── QR SCANNER SIMULATION ─── */
.qr-scanner {
  width: 100%; max-width: 300px; margin: 0 auto;
  aspect-ratio: 1; border-radius: var(--radius);
  border: 2px dashed var(--border2); overflow: hidden; position: relative;
  background: var(--bg3); display: flex; align-items: center; justify-content: center;
}
.scanner-line {
  position: absolute; left: 10%; width: 80%; height: 2px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
  animation: scanLine 2s ease-in-out infinite;
}
@keyframes scanLine {
  0% { top: 10%; }
  50% { top: 85%; }
  100% { top: 10%; }
}
.scanner-corner {
  position: absolute; width: 20px; height: 20px;
}
.scanner-corner.tl { top: 10px; left: 10px; border-top: 2px solid var(--accent); border-left: 2px solid var(--accent); }
.scanner-corner.tr { top: 10px; right: 10px; border-top: 2px solid var(--accent); border-right: 2px solid var(--accent); }
.scanner-corner.bl { bottom: 10px; left: 10px; border-bottom: 2px solid var(--accent); border-left: 2px solid var(--accent); }
.scanner-corner.br { bottom: 10px; right: 10px; border-bottom: 2px solid var(--accent); border-right: 2px solid var(--accent); }
.scanner-text { font-size: 12px; color: var(--text3); text-align: center; }

/* ─── TABS ─── */
.tabs { display: flex; gap: 4px; background: var(--bg3); border-radius: var(--radius2); padding: 4px; margin-bottom: 20px; }
.tab-btn {
  flex: 1; padding: 8px 14px; border-radius: 6px; border: none; cursor: pointer;
  font-size: 13px; font-weight: 600; font-family: 'DM Sans', sans-serif;
  color: var(--text2); background: transparent; transition: all .2s;
}
.tab-btn.active { background: var(--surface2); color: var(--text); box-shadow: 0 2px 8px rgba(0,0,0,0.2); }

/* ─── ALERT ─── */
.alert {
  padding: 12px 16px; border-radius: var(--radius2); font-size: 13px;
  display: flex; align-items: flex-start; gap: 10px; margin-bottom: 16px;
}
.alert-success { background: rgba(0,200,122,0.1); border: 1px solid rgba(0,200,122,0.3); color: var(--success); }
.alert-danger { background: rgba(255,59,92,0.1); border: 1px solid rgba(255,59,92,0.3); color: var(--danger); }
.alert-warn { background: rgba(255,107,53,0.1); border: 1px solid rgba(255,107,53,0.3); color: var(--warn); }
.alert-info { background: rgba(0,212,255,0.08); border: 1px solid rgba(0,212,255,0.2); color: var(--accent); }

/* ─── SEARCH BAR ─── */
.search-bar {
  display: flex; align-items: center; gap: 10px;
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: var(--radius2); padding: 0 14px; flex: 1;
}
.search-bar input {
  flex: 1; background: none; border: none; outline: none;
  color: var(--text); font-size: 14px; padding: 10px 0;
  font-family: 'DM Sans', sans-serif;
}
.search-bar input::placeholder { color: var(--text3); }
.search-icon { color: var(--text3); }

/* ─── LOADING ─── */
.spinner {
  width: 24px; height: 24px; border: 2px solid var(--border);
  border-top-color: var(--accent); border-radius: 50%;
  animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-overlay {
  display: flex; align-items: center; justify-content: center;
  padding: 60px; flex-direction: column; gap: 16px; color: var(--text2);
}

// ─── ANALYTICS PAGE ──────────────────────────────────────────────────────────
function renderAnalyticsPage() {
  const passes = state.passes;
  const logs = state.verifyLogs;
  const active = passes.filter(p => !isPassExpired(p)).length;
  const expired = passes.filter(p => isPassExpired(p)).length;
  const totalVerify = logs.length;
  const validVerify = logs.filter(l => l.result === 'valid').length;

  const div = el('div');
  div.innerHTML = `
    <div class="section-title">Analytics</div>
    <div class="section-sub">System usage and performance metrics</div>
    <div class="stats-grid" style="margin-bottom:24px;">
      <div class="stat-card">
        <div class="stat-value text-success">${active}</div>
        <div class="stat-label">Active Passes</div>
        <div class="stat-icon">✅</div>
      </div>
      <div class="stat-card">
        <div class="stat-value text-danger">${expired}</div>
        <div class="stat-label">Expired Passes</div>
        <div class="stat-icon">⏰</div>
      </div>
      <div class="stat-card">
        <div class="stat-value text-accent">${totalVerify}</div>
        <div class="stat-label">Total Verifications</div>
        <div class="stat-icon">🔍</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" style="color:var(--gold);">${totalVerify ? Math.round(validVerify/totalVerify*100) : 0}%</div>
        <div class="stat-label">Valid Pass Rate</div>
        <div class="stat-icon">📊</div>
      </div>
    </div>
    <div class="grid-2">
      <div class="card">
        <div class="card-title" style="margin-bottom:16px;">Pass Status Distribution</div>
        <div class="chart-container">
          <canvas id="passStatusChart"></canvas>
        </div>
      </div>
      <div class="card">
        <div class="card-title" style="margin-bottom:16px;">Verifications by Route</div>
        <div class="chart-container">
          <canvas id="verifyRouteChart"></canvas>
        </div>
      </div>
    </div>
    <div class="card" style="margin-top:20px;">
      <div class="card-title" style="margin-bottom:16px;">Route-wise Pass Count</div>
      ${ROUTES.map(r => {
        const count = passes.filter(p => p.routeId === r.id).length;
        const max = Math.max(...ROUTES.map(rx => passes.filter(p => p.routeId === rx.id).length), 1);
        const pct = Math.round(count / max * 100);
        return `
          <div style="margin-bottom:14px;">
            <div style="display:flex;justify-content:space-between;margin-bottom:5px;">
              <span style="font-size:13px;font-weight:600;">${r.name}</span>
              <span style="font-size:13px;color:var(--accent);">${count} passes</span>
            </div>
            <div class="progress-bar">
              <div class="progress-fill" style="width:${pct}%;background:linear-gradient(90deg,var(--accent),var(--accent3));"></div>
            </div>
          </div>
        `;
      }).join('')}
    </div>
  `;

  setTimeout(() => {
    const ctx1 = document.getElementById('passStatusChart');
    if (ctx1) new Chart(ctx1, {
      type: 'pie',
      data: {
        labels: ['Active', 'Expired'],
        datasets: [{ data: [active, expired], backgroundColor: ['#00c87a','#ff3b5c'], borderWidth: 0 }]
      },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { labels: { color: '#8a9bb8' } } } }
    });
    const ctx2 = document.getElementById('verifyRouteChart');
    if (ctx2) {
      const routeVerify = ROUTES.map(r => {
        const rPasses = passes.filter(p => p.routeId === r.id).map(p => p.id);
        return logs.filter(l => rPasses.includes(l.passId)).length;
      });
      new Chart(ctx2, {
        type: 'bar',
        data: {
          labels: ROUTES.map(r => r.id),
          datasets: [{ label: 'Verifications', data: routeVerify, backgroundColor: 'rgba(0,212,255,0.6)', borderRadius: 6 }]
        },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { ticks: { color: '#8a9bb8' }, grid: { color: '#2a3550' } }, y: { ticks: { color: '#8a9bb8' }, grid: { color: '#2a3550' } } } }
      });
    }
  }, 100);

  return div;
}

function closeModal() { setState({ modal: null }); }

// ─── EVENT HANDLERS ──────────────────────────────────────────────────────────
function attachLoginEvents() {
  const loginBtn = document.getElementById('loginBtn');
  const goReg = document.getElementById('goRegister');
  const goLogin = document.getElementById('goLogin');
  const regBtn = document.getElementById('registerBtn');
  const regPhoto = document.getElementById('regPhoto');

  if (loginBtn) loginBtn.onclick = doLogin;
  if (goReg) goReg.onclick = () => setState({ currentPage: 'register' });
  if (goLogin) goLogin.onclick = () => setState({ currentPage: 'login' });
  if (regBtn) regBtn.onclick = doRegister;
  if (regPhoto) regPhoto.onchange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      const wrap = document.getElementById('photoPreviewWrap');
      if (wrap) wrap.innerHTML = `<img src="${ev.target.result}" class="photo-preview"><div style="font-size:12px;color:var(--success);">✅ Photo ready</div>`;
      window._regPhotoData = ev.target.result;
    };
    reader.readAsDataURL(file);
  };

  // Enter key login
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      if (state.currentPage === 'login') doLogin();
      if (state.currentPage === 'register') doRegister();
    }
  }, { once: true });
}

function attachPageEvents() {
  // Nav items
  document.querySelectorAll('[data-nav]').forEach(el => {
    el.onclick = () => setState({ currentPage: el.dataset.nav });
  });
  // Logout
  const logoutBtn = document.getElementById('logoutBtn');
  if (logoutBtn) logoutBtn.onclick = () => {
    setState({ currentUser: null, currentPage: 'login' });
    window._regPhotoData = null;
    showAlert('Logged out successfully', 'success');
  };
  // Sidebar toggle
  const sidebarToggle = document.getElementById('sidebarToggle');
  if (sidebarToggle) sidebarToggle.onclick = () => setState({ sidebarOpen: !state.sidebarOpen });
}

function doLogin() {
  const email = document.getElementById('loginEmail')?.value?.trim();
  const pw = document.getElementById('loginPassword')?.value;
  const alertEl = document.getElementById('loginAlert');

  if (!email || !pw) {
    if (alertEl) alertEl.innerHTML = `<div class="alert alert-danger">Please fill in all fields.</div>`;
    return;
  }

  const user = state.users.find(u => u.email === email && u.password === pw);
  if (!user) {
    if (alertEl) alertEl.innerHTML = `<div class="alert alert-danger">Invalid credentials. Please try again.</div>`;
    return;
  }

  const defaultPage = { admin: 'dashboard', verifier: 'verify', student: 'dashboard' }[user.role];
  setState({ currentUser: user, currentPage: defaultPage });
  showAlert(`Welcome back, ${user.name.split(' ')[0]}!`, 'success');
}

function doRegister() {
  const name = document.getElementById('regName')?.value?.trim();
  const roll = document.getElementById('regRoll')?.value?.trim();
  const email = document.getElementById('regEmail')?.value?.trim();
  const phone = document.getElementById('regPhone')?.value?.trim();
  const dept = document.getElementById('regDept')?.value;
  const sem = document.getElementById('regSem')?.value;
  const pw = document.getElementById('regPw')?.value;
  const pw2 = document.getElementById('regPw2')?.value;
  const alertEl = document.getElementById('regAlert');

  if (!name || !roll || !email || !dept || !sem || !pw) {
    if (alertEl) alertEl.innerHTML = `<div class="alert alert-danger">Please fill all required fields.</div>`;
    return;
  }
  if (pw !== pw2) {
    if (alertEl) alertEl.innerHTML = `<div class="alert alert-danger">Passwords do not match.</div>`;
    return;
  }
  if (pw.length < 6) {
    if (alertEl) alertEl.innerHTML = `<div class="alert alert-danger">Password must be at least 6 characters.</div>`;
    return;
  }
  if (state.users.find(u => u.email === email)) {
    if (alertEl) alertEl.innerHTML = `<div class="alert alert-danger">Email already registered.</div>`;
    return;
  }

  const newUser = {
    id: genID('U'), name, email, password: pw, role: 'student',
    rollNo: roll, dept, semester: sem, phone: phone || '',
    avatar: window._regPhotoData || null,
    createdAt: new Date().toISOString(),
  };
  state.users.push(newUser);
  window._regPhotoData = null;
  setState({ currentUser: newUser, currentPage: 'dashboard' });
  showAlert(`Account created! Welcome, ${name.split(' ')[0]}!`, 'success');
}

// Apply page functions
window.selectRoute = (routeId) => {
  window._selectedRoute = routeId;
  document.querySelectorAll('.route-card').forEach(c => {
    c.classList.toggle('selected', c.dataset.route === routeId);
  });
  const route = getRoute(routeId);
  const amtGroup = document.getElementById('applyAmountGroup');
  const amtInput = document.getElementById('applyAmount');
  const submitBtn = document.getElementById('submitApplyBtn');
  if (amtGroup) amtGroup.style.display = 'block';
  if (amtInput && route) amtInput.value = `₹${route.fare} / month`;
  checkApplyReady();
};

window.checkApplyReady = () => {
  const receipt = document.getElementById('applyReceipt')?.value?.trim();
  const submitBtn = document.getElementById('submitApplyBtn');
  if (submitBtn) submitBtn.disabled = !(window._selectedRoute && receipt && receipt.length >= 5);
};

document.addEventListener('input', (e) => {
  if (e.target.id === 'applyReceipt') checkApplyReady();
});

window.submitApplication = () => {
  const u = state.currentUser;
  const receipt = document.getElementById('applyReceipt')?.value?.trim();
  const phone = document.getElementById('applyPhone')?.value?.trim();
  const route = getRoute(window._selectedRoute);

  if (!window._selectedRoute || !receipt) { showAlert('Please select route and enter receipt', 'danger'); return; }

  // Check receipt duplicate
  if (state.applications.find(a => a.receiptNo === receipt)) {
    document.getElementById('receiptError').textContent = 'Receipt number already used!';
    return;
  }

  const app = {
    id: genID('APP'), studentId: u.id, studentName: u.name, rollNo: u.rollNo || '',
    dept: u.dept || '', routeId: window._selectedRoute,
    receiptNo: receipt, amount: route?.fare || 0,
    status: 'pending', appliedAt: new Date().toISOString(),
    reviewedAt: null, reviewedBy: null, remarks: '',
    semester: u.semester || '', phone: phone || u.phone || '',
  };
  state.applications.push(app);
  window._selectedRoute = null;
  setState({ currentPage: 'dashboard' });
  showAlert('Application submitted successfully! Awaiting admin review.', 'success');
};

// Admin functions
window.viewApplication = (id) => {
  const app = state.applications.find(a => a.id === id);
  if (app) setState({ modal: { type: 'viewApp', data: app } });
};

window.approveApp = (id, fromModal = false) => {
  const appIdx = state.applications.findIndex(a => a.id === id);
  if (appIdx === -1) return;
  const app = state.applications[appIdx];
  const remarks = fromModal ? (document.getElementById('modalRemarks')?.value || '') : '';
  
  state.applications[appIdx] = { ...app, status: 'approved', reviewedAt: new Date().toISOString(), reviewedBy: state.currentUser.name, remarks };
  
  // Issue pass
  const now2 = new Date();
  const validFrom = new Date(now2.getFullYear(), now2.getMonth(), 1);
  const validTo = new Date(now2.getFullYear(), now2.getMonth() + 1, 0);
  const newPass = {
    id: genPassID(), appId: app.id, studentId: app.studentId,
    studentName: app.studentName, rollNo: app.rollNo, dept: app.dept,
    routeId: app.routeId, issuedAt: new Date().toISOString(),
    validFrom: validFrom.toISOString(), validTo: validTo.toISOString(),
    status: 'active', verifyCount: 0,
  };
  state.passes.push(newPass);
  setState({ modal: null, currentPage: 'applications' });
  showAlert(`Pass issued for ${app.studentName}! Pass ID: ${newPass.id}`, 'success');
};

window.rejectApp = (id, fromModal = false) => {
  const appIdx = state.applications.findIndex(a => a.id === id);
  if (appIdx === -1) return;
  const app = state.applications[appIdx];
  const remarks = fromModal ? (document.getElementById('modalRemarks')?.value || 'Rejected by admin') : 'Rejected by admin';
  state.applications[appIdx] = { ...app, status: 'rejected', reviewedAt: new Date().toISOString(), reviewedBy: state.currentUser.name, remarks };
  setState({ modal: null, currentPage: 'applications' });
  showAlert(`Application ${id} rejected.`, 'danger');
};

window.viewPassAdmin = (id) => {
  const pass = state.passes.find(p => p.id === id);
  if (pass) setState({ modal: { type: 'viewPassAdmin', data: pass } });
};

// Filter applications
window.filterApps = (searchVal) => {
  const search = (searchVal !== undefined ? searchVal : document.getElementById('appSearch')?.value || '').toLowerCase();
  const filter = document.getElementById('appFilter')?.value || '';
  const apps = state.applications.filter(a => {
    const matchSearch = !search || a.studentName.toLowerCase().includes(search) || a.rollNo.toLowerCase().includes(search);
    const matchFilter = !filter || a.status === filter;
    return matchSearch && matchFilter;
  }).sort((a,b) => new Date(b.appliedAt) - new Date(a.appliedAt));
  const tbody = document.getElementById('appsTableBody');
  if (tbody) tbody.innerHTML = renderAppsRows(apps);
};

// Verification
window.switchVerifyTab = (tab) => {
  document.getElementById('manualPanel').style.display = tab === 'manual' ? '' : 'none';
  document.getElementById('qrPanel').style.display = tab === 'qr' ? '' : 'none';
  document.getElementById('tabManual').classList.toggle('active', tab === 'manual');
  document.getElementById('tabQr').classList.toggle('active', tab === 'qr');
};

window.fillDemoPassId = () => {
  const activePass = state.passes.find(p => !isPassExpired(p));
  if (activePass) {
    document.getElementById('verifyPassId').value = activePass.id;
  }
};

window.doVerify = () => {
  const passId = document.getElementById('verifyPassId')?.value?.trim();
  if (!passId) { showAlert('Enter a pass ID', 'warn'); return; }
  performVerify(passId);
};

window.simulateScan = (type) => {
  if (type === 'valid') {
    const activePass = state.passes.find(p => !isPassExpired(p));
    performVerify(activePass ? activePass.id : 'INVALID');
  } else {
    performVerify('INVALID_PASS_ID');
  }
};

function performVerify(passId) {
  const pass = state.passes.find(p => p.id === passId);
  const resultEl = document.getElementById('verifyResult');
  if (!resultEl) return;

  const logEntry = {
    id: genID('VL'), passId, studentName: pass?.studentName || 'Unknown',
    rollNo: pass?.rollNo || '–', routeId: pass?.routeId || '–',
    result: (pass && !isPassExpired(pass)) ? 'valid' : 'invalid',
    timestamp: new Date().toISOString(),
    ip: `192.168.${Math.floor(Math.random()*10)}.${Math.floor(Math.random()*255)}`,
    device: navigator.userAgent.includes('Chrome') ? 'Chrome/'+navigator.platform : 'Browser/'+navigator.platform,
  };
  state.verifyLogs.unshift(logEntry);

  if (pass && !isPassExpired(pass)) {
    const route = getRoute(pass.routeId);
    pass.verifyCount = (pass.verifyCount || 0) + 1;
    resultEl.innerHTML = `
      <div class="verify-result valid">
        <span class="verify-tick">✅</span>
        <div style="font-family:'Syne',sans-serif;font-size:20px;font-weight:700;color:var(--success);">Pass Valid!</div>
        <div style="margin-top:12px;display:grid;grid-template-columns:1fr 1fr;gap:10px;">
          ${[
            ['Student', pass.studentName], ['Roll No', pass.rollNo],
            ['Department', pass.dept], ['Route', route?.name || pass.routeId],
            ['Valid Until', fmtDate(pass.validTo)], ['Pass ID', pass.id.slice(0,10)+'…'],
          ].map(([l,v]) => `
            <div style="background:rgba(0,200,122,0.08);padding:8px 10px;border-radius:var(--radius2);">
              <div style="font-size:10px;color:var(--text3);">${l}</div>
              <div style="font-size:13px;font-weight:600;">${v}</div>
            </div>
          `).join('')}
        </div>
        <div style="margin-top:12px;font-size:12px;color:var(--text3);">Verified at ${fmtTime(logEntry.timestamp)} · IP: ${logEntry.ip}</div>
      </div>
    `;
  } else if (pass && isPassExpired(pass)) {
    resultEl.innerHTML = `
      <div class="verify-result invalid">
        <span class="verify-tick">⚠️</span>
        <div style="font-family:'Syne',sans-serif;font-size:20px;font-weight:700;color:var(--warn);">Pass Expired!</div>
        <div style="margin-top:8px;color:var(--text2);">This pass expired on <strong>${fmtDate(pass.validTo)}</strong>.</div>
        <div style="margin-top:8px;font-size:13px;">Student: <strong>${pass.studentName}</strong> (${pass.rollNo})</div>
        <div style="margin-top:8px;font-size:12px;color:var(--text3);">Ask student to renew their pass.</div>
      </div>
    `;
  } else {
    resultEl.innerHTML = `
      <div class="verify-result invalid">
        <span class="verify-tick">❌</span>
        <div style="font-family:'Syne',sans-serif;font-size:20px;font-weight:700;color:var(--danger);">Invalid Pass!</div>
        <div style="margin-top:8px;color:var(--text2);">Pass ID <strong class="font-mono">${passId}</strong> not found in the system.</div>
        <div style="margin-top:8px;font-size:12px;color:var(--danger);">This may be a fake or tampered pass. Report to admin.</div>
        <div style="margin-top:8px;font-size:12px;color:var(--text3);">Attempt logged at ${fmtTime(logEntry.timestamp)}</div>
      </div>
    `;
  }
  setState({});
}

// ─── BOOT ────────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
